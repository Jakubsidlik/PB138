services:
  postgres:
    image: postgres:16-alpine
    container_name: pb138-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pb138
    ports:
      - "5432:5432"
    volumes:
      - pb138_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pb138"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pb138_postgres_data:
